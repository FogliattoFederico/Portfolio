[build]
  command = "npm run netlify"
  publish = "build"

# Solo redirige archivos HTML, NO imágenes ni assets
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false  # Importante: no forzar para archivos existentes
  # Netlify automáticamente no redirigirá archivos que existan físicamente

# O mejor aún, especifica qué NO redirigir
[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200
  conditions = {Status = "200"}

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"